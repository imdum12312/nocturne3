<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-69T9E59SM7"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-69T9E59SM7');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Nocturne · Editor</title>
    <style>html,body{background:#05060d;color:#eae6ff;margin:0}</style>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='13' fill='%23c9c1ff'/><circle cx='22' cy='14' r='11' fill='%23050610'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/global.css">
    <link rel="stylesheet" href="/src/css/dock.css">
    <link rel="stylesheet" href="/src/css/code.css">
    <link rel="stylesheet" href="/src/css/ai.css">
</head>
<body>

<div id="codeTopbar">
    <div class="ct-brand">
        <span>Nocturne</span>
        <span class="sub">Editor</span>
    </div>
    <input type="text" id="fileName" class="ct-file" value="untitled" spellcheck="false">

    <div class="ct-spacer"></div>

    <select id="langSelect" class="ct-lang" title="Language">
        <option value="javascript">JavaScript</option>
        <option value="typescript">TypeScript</option>
        <option value="python">Python</option>
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="json">JSON</option>
        <option value="markdown">Markdown</option>
        <option value="sql">SQL</option>
        <option value="rust">Rust</option>
        <option value="go">Go</option>
        <option value="plaintext">Plain</option>
    </select>

    <button id="btnTemplate" class="ct-icon" title="New from template">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    </button>
    <button id="btnFormat" class="ct-icon" title="Format (Alt+Shift+F)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="6" x2="3" y2="6"/><line x1="15" y1="12" x2="3" y2="12"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
    </button>
    <button id="btnCopy" class="ct-icon" title="Copy all">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    </button>
    <button id="btnShare" class="ct-icon" title="Share via URL">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>
    </button>
    <button id="btnDownload" class="ct-icon" title="Download file">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button id="btnUpload" class="ct-icon" title="Upload file">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </button>
    <input type="file" id="uploadInput" style="display:none" accept=".js,.ts,.py,.html,.htm,.css,.json,.md,.markdown,.sql,.rs,.go,.txt">
    <button id="btnPrefs" class="ct-icon" title="Editor preferences">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
    </button>
    <button id="btnClear" class="ct-icon" title="Clear">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </button>
    <button id="btnAi" class="ct-ai" title="AI assistant">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.5 6.5L21 11l-6.5 2.5L12 20l-2.5-6.5L3 11l6.5-2.5z"/></svg>
        <span>AI</span>
    </button>
    <button id="btnRun" class="ct-run" title="Run (Ctrl+Enter)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5v14l11-7z"/></svg>
        <span>Run</span>
    </button>
</div>

<div id="codeBooting"><span>loading<span class="dots"></span></span></div>

<div id="editor"></div>

<div id="prefsPanel">
    <div class="pp-title">Preferences</div>
    <div class="pp-row">
        <label for="prefFont">Font size</label>
        <div class="pp-right">
            <input type="range" id="prefFont" min="10" max="22" step="0.5">
            <span id="prefFontVal" class="pp-val"></span>
        </div>
    </div>
    <div class="pp-row">
        <label for="prefWrap">Word wrap</label>
        <label class="toggle-wrap">
            <input type="checkbox" id="prefWrap">
            <span class="toggle-track"></span>
        </label>
    </div>
    <div class="pp-row">
        <label for="prefMini">Minimap</label>
        <label class="toggle-wrap">
            <input type="checkbox" id="prefMini">
            <span class="toggle-track"></span>
        </label>
    </div>
    <div class="pp-row">
        <label for="prefLig">Font ligatures</label>
        <label class="toggle-wrap">
            <input type="checkbox" id="prefLig">
            <span class="toggle-track"></span>
        </label>
    </div>
</div>

<div id="templateOverlay">
    <div id="templateModal">
        <div class="tm-head">
            <span class="tm-title">Templates</span>
            <button id="btnTemplateClose" class="ct-icon" title="Close">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div id="templateGrid"></div>
    </div>
</div>

<div id="outputPanel">
    <div id="outputHeader">
        <span class="oh-label">Output</span>
        <div class="oh-spacer"></div>
        <button id="btnClearOut" class="ct-icon" title="Clear output">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
        <button id="btnCloseOut" class="ct-icon" title="Close">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <div id="outputLog"></div>
</div>

<div id="codeStatusBar">
    <span id="stStatus">ready</span>
    <span class="sep">·</span>
    <span id="stLang">javascript</span>
    <span class="sep">·</span>
    <span id="cursorInfo">ln 1, col 1</span>
    <span class="sep">·</span>
    <span id="stLines">0 lines</span>
    <span class="sep">·</span>
    <span id="stChars">0 chars</span>
</div>

<aside id="aiPanel">
    <div class="ai-head">
        <span class="ai-title">AI · <span id="aiModel">gemini-3-flash</span></span>
        <button class="ct-icon" id="btnAiClear" title="New chat">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button class="ct-icon" id="btnAiSettings" title="AI settings">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
        </button>
        <button class="ct-icon" id="btnAiClose" title="Close">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>

    <div class="ai-messages"></div>

    <div class="ai-quick">
        <button class="ai-quick-btn" data-action="explain">Explain</button>
        <button class="ai-quick-btn" data-action="refactor">Refactor</button>
        <button class="ai-quick-btn" data-action="comment">Comment</button>
        <button class="ai-quick-btn" data-action="debug">Debug</button>
        <button class="ai-quick-btn" data-action="test">Tests</button>
        <button class="ai-quick-btn" data-action="optimize">Optimize</button>
    </div>

    <div class="ai-settings">
        <label>API key
            <div class="row">
                <input type="password" id="aiKey" autocomplete="off" spellcheck="false">
                <button id="btnAiKeyClear" title="Remove from localStorage">clear</button>
            </div>
        </label>
        <label>Model
            <input type="text" id="aiModelInput" autocomplete="off" spellcheck="false">
        </label>
        <label>
            <span>Include current code</span>
            <input type="checkbox" id="aiIncludeCode" checked>
        </label>
        <div class="warn">Key is stored in localStorage on this device. Don't deploy this editor publicly with a key baked in — anyone can read client-side JS.</div>
    </div>

    <div class="ai-input-wrap">
        <textarea class="ai-input" placeholder="Ask anything... (Enter to send, Shift+Enter for newline)"></textarea>
        <button id="aiSend">Send</button>
    </div>
</aside>

<nav id="dock">
    <a class="dock-btn" href="/" aria-label="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l9-7 9 7v10a2 2 0 0 1-2 2h-4v-6h-6v6H5a2 2 0 0 1-2-2z"/></svg>
    </a>
    <a class="dock-btn" href="/apps.html" aria-label="Apps">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    </a>
    <a class="dock-btn active" href="/code.html" aria-label="Editor">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 6 2 12 8 18"/><polyline points="16 6 22 12 16 18"/></svg>
    </a>
    <a class="dock-btn" href="/legal.html" aria-label="Legal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h12a2 2 0 0 0 2-2v-2H10v2a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v3h4"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/><path d="M15 8h-6"/><path d="M15 12h-6"/></svg>
    </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs/loader.js"></script>
<script src="/src/js/debug.js" defer></script>
<script src="/src/js/code.js" type="module"></script>

</body>
</html>
