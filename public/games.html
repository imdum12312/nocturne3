<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Nocturne - Games</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='13' fill='%23c9c1ff'/><circle cx='22' cy='14' r='11' fill='%23050610'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05060d;
            --bg-2: #0a0b14;
            --bg-3: #10111f;
            --panel: rgba(20, 22, 38, 0.55);
            --line: rgba(200, 195, 230, 0.06);
            --line-2: rgba(200, 195, 230, 0.11);
            --line-3: rgba(200, 195, 230, 0.18);
            --fg: #e8e5f4;
            --fg-2: #a9a3c7;
            --fg-3: #706b8f;
            --dim: #3f3c5a;
            --accent: #b8b0da;
            --accent-2: #8a80b6;
            --primary: #fc2651;
            --primary-hover: #e91e47;
            --ease: cubic-bezier(0.22, 0.72, 0.14, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(180deg, rgba(252, 38, 81, 0.1) 0%, transparent 100%);
            border-bottom: 1px solid var(--line);
            padding: 2rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex: 1;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .search-bar {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 0.65rem 1rem 0.65rem 2.5rem;
            background: var(--bg-2);
            border: 1px solid var(--line-2);
            border-radius: 8px;
            color: var(--fg);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s var(--ease);
        }

        .search-bar input:focus {
            border-color: var(--primary);
            background: var(--bg-3);
            box-shadow: 0 0 0 3px rgba(252, 38, 81, 0.1);
        }

        .search-bar input::placeholder {
            color: var(--fg-3);
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--fg-3);
            pointer-events: none;
            width: 16px;
            height: 16px;
        }

        .header-right {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--panel);
            border: 1px solid var(--line-2);
            border-radius: 6px;
            color: var(--fg-2);
            cursor: pointer;
            transition: all 0.3s var(--ease);
        }

        .btn-icon:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(252, 38, 81, 0.1);
        }

        #mainContent {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem 8rem;
            width: 100%;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .game-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s var(--ease);
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .game-card:hover {
            transform: translateY(-6px);
            border-color: var(--primary);
            background: rgba(252, 38, 81, 0.08);
            box-shadow: 0 0 20px rgba(252, 38, 81, 0.2);
        }

        .game-thumbnail {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: var(--bg-3);
            transition: transform 0.3s var(--ease);
        }

        .game-card:hover .game-thumbnail {
            transform: scale(1.05);
        }

        .game-info {
            padding: 0.75rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .game-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--fg);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .game-author {
            font-size: 0.65rem;
            color: var(--fg-3);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: auto;
        }

        .game-footer {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            font-size: 0.7rem;
            color: var(--fg-3);
        }

        .stat-dot {
            width: 3px;
            height: 3px;
            background: var(--primary);
            border-radius: 50%;
        }

        .favorite-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 28px;
            height: 28px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 4px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s var(--ease);
            z-index: 10;
        }

        .favorite-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            color: #fbbf24;
            transform: scale(1.1);
        }

        .favorite-btn.active {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.2);
        }

        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: linear-gradient(180deg, transparent 0%, var(--bg-2) 30%);
            border-top: 1px solid var(--line);
            display: flex;
            align-items: flex-end;
            padding: 0.75rem 1.5rem 1rem;
            gap: 0.75rem;
            overflow-x: auto;
            z-index: 1000;
            scrollbar-width: none;
        }

        .taskbar::-webkit-scrollbar {
            display: none;
        }

        .taskbar-item {
            width: 50px;
            height: 50px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.3s var(--ease);
            overflow: hidden;
        }

        .taskbar-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .taskbar-item:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .taskbar-item.active {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(252, 38, 81, 0.4);
        }

        #gameViewer {
            position: fixed;
            inset: 0;
            background: #000;
            display: none;
            z-index: 2000;
            flex-direction: column;
        }

        #gameViewer.visible {
            display: flex;
        }

        #gameViewer iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        #homeBtn {
            position: fixed;
            top: 1rem;
            left: 1rem;
            width: 40px;
            height: 40px;
            background: rgba(200, 195, 230, 0.1);
            border: 1px solid rgba(200, 195, 230, 0.2);
            border-radius: 8px;
            color: var(--fg);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--ease);
            z-index: 2100;
        }

        #homeBtn:hover {
            background: rgba(200, 195, 230, 0.2);
            transform: translateY(-2px);
        }

        #homeBtn.visible {
            display: flex;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: var(--fg-3);
            font-size: 1rem;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(200, 195, 230, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(200, 195, 230, 0.3);
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .header-left {
                flex-direction: column;
                width: 100%;
            }

            .search-bar {
                max-width: none;
            }

            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 0.75rem;
            }

            .main {
                padding: 1rem 1rem 8rem;
            }
        }
    </style>
</head>
<body>
    <button id="homeBtn" onclick="goHome()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 10l9-7 9 7v10a2 2 0 0 1-2 2h-4v-6h-6v6H5a2 2 0 0 1-2-2z"/>
        </svg>
    </button>

    <div class="header">
        <div class="header-content">
            <div class="header-left">
                <div class="logo">Games</div>
                <div class="search-bar">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search games..." oninput="filterGames()">
                </div>
            </div>
            <div class="header-right">
                <button class="btn-icon" onclick="toggleSort()" title="Sort">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M3 12h18M3 18h18"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div id="mainContent">
        <div class="main">
            <div id="gamesGrid" class="games-grid">
                <div class="loading">Loading games...</div>
            </div>
        </div>
    </div>

    <div class="taskbar" id="taskbar"></div>

    <div id="gameViewer">
        <iframe id="gameFrame"></iframe>
    </div>

    <script>
        const API_URL = 'https://raw.githubusercontent.com/gn-math/assets/main/zones.json';
        const COVER_URL = 'https://cdn.jsdelivr.net/gh/gn-math/covers@main';
        const HTML_URL = 'https://cdn.jsdelivr.net/gh/gn-math/html@main';
        let allGames = [];
        let filteredGames = [];
        let favorites = JSON.parse(localStorage.getItem('gameFavorites') || '[]');
        let sortBy = 'name';

        async function loadGames() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Failed to load games');
                allGames = await response.json();
                allGames = allGames.map(game => ({
                    ...game,
                    cover: game.cover.replace('{COVER_URL}', COVER_URL),
                    url: game.url.replace('{HTML_URL}', HTML_URL)
                }));
                filteredGames = [...allGames];
                renderGames();
            } catch (error) {
                console.error('Error loading games:', error);
                document.getElementById('gamesGrid').innerHTML = '<div class="loading">Failed to load games</div>';
            }
        }

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            if (filteredGames.length === 0) {
                grid.innerHTML = '<div class="loading">No games found</div>';
                return;
            }

            grid.innerHTML = filteredGames.map(game => {
                const isFavorite = favorites.includes(game.id);
                const authorName = game.author || 'Unknown';
                return `
                    <div class="game-card" onclick="playGame(${game.id})">
                        <div style="position: relative;">
                            <img src="${game.cover}" alt="${game.name}" class="game-thumbnail" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 160 160%22><rect fill=%22%230a0b14%22 width=%22160%22 height=%22160%22/><text x=%2280%22 y=%2280%22 text-anchor=%22middle%22 fill=%22%23706b8f%22 font-size=%2214%22>${game.name.substring(0, 10)}</text></svg>'">
                            <button class="favorite-btn ${isFavorite ? 'active' : ''}" onclick="toggleFavorite(event, ${game.id})" title="Add to favorites">★</button>
                        </div>
                        <div class="game-info">
                            <div class="game-title">${game.name}</div>
                            <div class="game-author">${authorName}</div>
                            <div class="game-footer">
                                <span class="stat-dot"></span>
                                <span>Click to play</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterGames() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            filteredGames = allGames.filter(g =>
                g.name.toLowerCase().includes(query) ||
                (g.author && g.author.toLowerCase().includes(query))
            );
            renderGames();
        }

        function toggleSort() {
            const sorts = ['name', 'author', 'featured'];
            const currentIndex = sorts.indexOf(sortBy);
            sortBy = sorts[(currentIndex + 1) % sorts.length];

            if (sortBy === 'name') {
                allGames.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortBy === 'author') {
                allGames.sort((a, b) => (a.author || '').localeCompare(b.author || ''));
            } else if (sortBy === 'featured') {
                allGames.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));
            }
            filteredGames = [...allGames];
            filterGames();
        }

        function playGame(gameId) {
            const game = allGames.find(g => g.id === gameId);
            if (!game) return;

            document.getElementById('gameViewer').classList.add('visible');
            document.getElementById('gameFrame').src = game.url;
            document.getElementById('homeBtn').classList.add('visible');

            addToTaskbar(game);
            updateURL(gameId);
        }

        function updateURL(gameId) {
            const url = new URL(window.location);
            url.searchParams.set('play', gameId);
            history.pushState(null, '', url.toString());
        }

        function toggleFavorite(event, gameId) {
            event.stopPropagation();
            const index = favorites.indexOf(gameId);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(gameId);
            }
            localStorage.setItem('gameFavorites', JSON.stringify(favorites));
            renderGames();
        }

        function closeGame() {
            document.getElementById('gameViewer').classList.remove('visible');
            document.getElementById('gameFrame').src = '';
            document.getElementById('homeBtn').classList.remove('visible');
            history.replaceState(null, '', '/games.html');
        }

        function goHome() {
            window.location.href = '/';
        }

        function addToTaskbar(game) {
            let taskbar = document.getElementById('taskbar');
            const existing = taskbar.querySelector(`[data-game-id="${game.id}"]`);

            if (existing) {
                existing.classList.add('active');
                return;
            }

            const item = document.createElement('div');
            item.className = 'taskbar-item active';
            item.setAttribute('data-game-id', game.id);
            item.innerHTML = `<img src="${game.cover}" alt="${game.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 50 50%22><rect fill=%22%230a0b14%22 width=%2250%22 height=%2250%22/></svg>'">`;
            item.onclick = () => playGame(game.id);
            taskbar.appendChild(item);
        }

        document.addEventListener('DOMContentLoaded', loadGames);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('gameViewer').classList.contains('visible')) {
                closeGame();
            }
        });
    </script>
</body>
</html>
