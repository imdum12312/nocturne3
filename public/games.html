<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='13' fill='%23c9c1ff'/><circle cx='22' cy='14' r='11' fill='%23050610'/></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nocturne - Games</title>
    <meta name="description" content="Play games on Nocturne. Unblocked games for school or home.">
    <meta property="og:title" content="Nocturne Games">
    <meta name="color-scheme" content="dark">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05060d;
            --bg-2: #0a0b14;
            --bg-3: #10111f;
            --panel: rgba(20, 22, 38, 0.55);
            --line: rgba(200, 195, 230, 0.06);
            --line-2: rgba(200, 195, 230, 0.11);
            --fg: #e8e5f4;
            --fg-2: #a9a3c7;
            --fg-3: #706b8f;
            --primary: #fc2651;
            --primary-hover: #e91e47;
            --ease: cubic-bezier(0.22, 0.72, 0.14, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        header {
            background: linear-gradient(180deg, rgba(252, 38, 81, 0.1) 0%, transparent 100%);
            border-bottom: 1px solid var(--line);
            padding: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, #b8b0da 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            white-space: nowrap;
        }

        .search-container {
            display: flex;
            gap: 0.75rem;
            flex: 1;
            max-width: 500px;
        }

        .search-container input {
            flex: 1;
            padding: 0.65rem 1rem;
            background: var(--bg-2);
            border: 1px solid var(--line-2);
            border-radius: 6px;
            color: var(--fg);
            font-family: inherit;
            outline: none;
            transition: all 0.3s var(--ease);
        }

        .search-container input:focus {
            border-color: var(--primary);
            background: var(--bg-3);
            box-shadow: 0 0 0 3px rgba(252, 38, 81, 0.1);
        }

        .search-container input::placeholder {
            color: var(--fg-3);
        }

        .search-container select {
            padding: 0.65rem 1rem;
            background: var(--bg-2);
            border: 1px solid var(--line-2);
            border-radius: 6px;
            color: var(--fg);
            font-family: inherit;
            outline: none;
            cursor: pointer;
            transition: all 0.3s var(--ease);
        }

        .search-container select:hover,
        .search-container select:focus {
            border-color: var(--primary);
            background: var(--bg-3);
        }

        .control-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .control-buttons button {
            padding: 0.65rem 1.25rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s var(--ease);
        }

        .control-buttons button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem 8rem;
        }

        details {
            margin-bottom: 2rem;
        }

        summary {
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            padding: 1rem 0;
            color: var(--fg);
            transition: color 0.3s var(--ease);
        }

        summary:hover {
            color: var(--primary);
        }

        details[open] summary {
            margin-bottom: 1rem;
        }

        hr {
            border: none;
            border-top: 1px solid var(--line);
            margin: 1.5rem 0;
        }

        .zone-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }

        .zone-item {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s var(--ease);
            display: flex;
            flex-direction: column;
        }

        .zone-item:hover {
            transform: translateY(-6px);
            border-color: var(--primary);
            background: rgba(252, 38, 81, 0.08);
            box-shadow: 0 0 20px rgba(252, 38, 81, 0.2);
        }

        .zone-img-wrapper {
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            background: var(--bg-3);
        }

        .zone-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s var(--ease);
        }

        .zone-item:hover img {
            transform: scale(1.05);
        }

        .zone-info {
            padding: 0.75rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .zone-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--fg);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .zone-author {
            font-size: 0.65rem;
            color: var(--fg-3);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: auto;
        }

        #popupOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        #popupOverlay.show {
            display: flex;
        }

        .popup {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
        }

        .popup-header h3 {
            color: #fff;
            font-size: 1.25rem;
            margin: 0;
        }

        #popupClose {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }

        #popupClose:hover {
            transform: scale(1.1);
        }

        #popupBody {
            padding: 1.5rem;
            color: var(--fg-2);
        }

        footer {
            background: linear-gradient(180deg, transparent 0%, rgba(10, 11, 20, 0.5) 100%);
            border-top: 1px solid var(--line);
            padding: 2rem 1.5rem;
            margin-top: 4rem;
        }

        .footer-links {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer-links a,
        .footer-links label {
            color: var(--fg-2);
            text-decoration: none;
            transition: color 0.3s var(--ease);
        }

        .footer-links a:hover,
        .footer-links label:hover {
            color: var(--primary);
        }

        #importData {
            display: none;
        }

        #homeBtn {
            position: fixed;
            top: 1rem;
            left: 1rem;
            width: 40px;
            height: 40px;
            background: rgba(200, 195, 230, 0.1);
            border: 1px solid rgba(200, 195, 230, 0.2);
            border-radius: 8px;
            color: var(--fg);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--ease);
            z-index: 2100;
        }

        #homeBtn:hover {
            background: rgba(200, 195, 230, 0.2);
            transform: translateY(-2px);
        }

        #homeBtn.visible {
            display: flex;
        }

        #gameViewer {
            position: fixed;
            inset: 0;
            background: #000;
            display: none;
            z-index: 2001;
        }

        #gameViewer.visible {
            display: block;
        }

        #gameFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--fg-3);
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(200, 195, 230, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(200, 195, 230, 0.3);
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: stretch;
            }

            .search-container {
                max-width: none;
            }

            .zone-container {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 0.75rem;
            }

            main {
                padding: 1rem 1rem 8rem;
            }
        }
    </style>
</head>
<body>
    <button id="homeBtn" onclick="goHome()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 10l9-7 9 7v10a2 2 0 0 1-2 2h-4v-6h-6v6H5a2 2 0 0 1-2-2z"/>
        </svg>
    </button>

    <header>
        <div class="header-content">
            <a class="logo" href="/" style="text-decoration: none; color: inherit;">Nocturne</a>
            <div class="search-container">
                <input type="text" id="searchBar" placeholder="Search games..." oninput="filterZones()">
                <select id="sortOptions" onchange="sortZones()">
                    <option value="name">Name</option>
                    <option value="id">Date Added</option>
                </select>
            </div>
            <div class="control-buttons">
                <button id="settings">Settings</button>
            </div>
        </div>
    </header>

    <main>
        <details id="featuredZonesWrapper" open>
            <summary>Featured</summary>
            <div id="featuredZones" class="zone-container"></div>
        </details>
        <hr>
        <details id="allZonesWrapper" open>
            <summary>All Games</summary>
            <div id="container" class="zone-container"><div class="loading">Loading games...</div></div>
        </details>
    </main>

    <footer>
        <div class="footer-links">
            <a href="#" onclick="showContact(); return false;">Contact</a>
            <a href="#" onclick="loadPrivacy(); return false;">Privacy</a>
            <a href="javascript:saveData()">Export</a>
            <label for="importData">Import</label>
            <input type="file" id="importData" onchange="loadData(event)">
        </div>
    </footer>

    <div id="popupOverlay">
        <div class="popup">
            <div class="popup-header">
                <h3 id="popupTitle">Details</h3>
                <button id="popupClose" onclick="closePopup()">×</button>
            </div>
            <div id="popupBody"></div>
        </div>
    </div>

    <script>
        let allGames = [];
        let filteredGames = [];

        async function loadGames() {
            try {
                const response = await fetch('/api/games/list');
                if (!response.ok) throw new Error('Failed to load games');
                allGames = await response.json();
                filteredGames = [...allGames];
                renderGames();
            } catch (error) {
                console.error('Error loading games:', error);
                document.getElementById('container').innerHTML = '<div class="loading">Failed to load games</div>';
            }
        }

        function renderGames() {
            const grid = document.getElementById('container');
            if (filteredGames.length === 0) {
                grid.innerHTML = '<div class="loading">No games found</div>';
                return;
            }

            grid.innerHTML = filteredGames.map(game => `
                <div class="zone-item" onclick="playGame(${game.id})">
                    <div class="zone-img-wrapper">
                        <img src="${game.cover}" alt="${game.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 160 160%22><rect fill=%22%230a0b14%22 width=%22160%22 height=%22160%22/><text x=%2280%22 y=%2280%22 text-anchor=%22middle%22 fill=%22%23706b8f%22 font-size=%2214%22>${game.name.substring(0, 10)}</text></svg>'">
                    </div>
                    <div class="zone-info">
                        <div class="zone-name">${game.name}</div>
                        <div class="zone-author">${game.author || 'Unknown'}</div>
                    </div>
                </div>
            `).join('');
        }

        function filterZones() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            filteredGames = allGames.filter(g =>
                g.name.toLowerCase().includes(query) ||
                (g.author && g.author.toLowerCase().includes(query))
            );
            renderGames();
        }

        function sortZones() {
            const sortType = document.getElementById('sortOptions').value;
            if (sortType === 'name') {
                allGames.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortType === 'id') {
                allGames.sort((a, b) => b.id - a.id);
            }
            filteredGames = [...allGames];
            filterZones();
        }

        function playGame(gameId) {
            const game = allGames.find(g => g.id === gameId);
            if (!game) return;

            document.getElementById('gameViewer').classList.add('visible');
            document.getElementById('gameFrame').src = game.url;
            document.getElementById('homeBtn').classList.add('visible');
        }

        function goHome() {
            window.location.href = '/';
        }

        function closePopup() {
            document.getElementById('popupOverlay').classList.remove('show');
        }

        function showContact() {
            document.getElementById('popupTitle').textContent = 'Contact';
            document.getElementById('popupBody').innerHTML = '<p>Contact information goes here</p>';
            document.getElementById('popupOverlay').classList.add('show');
        }

        function loadPrivacy() {
            document.getElementById('popupTitle').textContent = 'Privacy Policy';
            document.getElementById('popupBody').innerHTML = '<p>Privacy policy content goes here</p>';
            document.getElementById('popupOverlay').classList.add('show');
        }

        function saveData() {
            alert('Export data functionality');
        }

        function loadData(event) {
            alert('Import data functionality');
        }

        document.getElementById('settings').addEventListener('click', () => {
            document.getElementById('popupTitle').textContent = 'Settings';
            document.getElementById('popupBody').innerHTML = '<p>Settings options go here</p>';
            document.getElementById('popupOverlay').classList.add('show');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('gameViewer').classList.contains('visible')) {
                document.getElementById('gameViewer').classList.remove('visible');
                document.getElementById('gameFrame').src = '';
                document.getElementById('homeBtn').classList.remove('visible');
            }
        });

        document.addEventListener('DOMContentLoaded', loadGames);
    </script>
</body>
</html>
